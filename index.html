<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SoberBlox - 3D игра</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #creator-hub {
            position: absolute;
            top: 0;
            left: -400px;
            width: 400px;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            z-index: 200;
            transition: left 0.3s ease;
            box-shadow: 2px 0 20px rgba(0,0,0,0.5);
            overflow-y: auto;
        }
        
        #creator-hub.open {
            left: 0;
        }
        
        .hub-header {
            background: #0f3460;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }
        
        .hub-header h1 {
            font-size: 24px;
            color: #e94560;
        }
        
        .hub-section {
            padding: 20px;
            border-bottom: 1px solid #2a2a4a;
        }
        
        .hub-section h3 {
            color: #e94560;
            margin-bottom: 15px;
        }
        
        .object-item {
            background: #0f0f1f;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            border-left: 3px solid #e94560;
        }
        
        .object-item:hover {
            background: #1a1a2e;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #0f0f1f;
            border: 1px solid #2a2a4a;
            color: white;
            border-radius: 6px;
        }
        
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #ff6b6b;
        }
        
        #toggle-hub {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 150;
            font-weight: bold;
        }
        
        #hud {
            position: absolute;
            top: 20px;
            left: 100px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
        }
        
        #chat-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 350px;
            background: rgba(0,0,0,0.85);
            border-radius: 8px;
            z-index: 100;
        }
        
        #chat-messages {
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            color: white;
            font-size: 13px;
        }
        
        .chat-message {
            margin-bottom: 6px;
        }
        
        .chat-username {
            color: #e94560;
            font-weight: bold;
        }
        
        #chat-input-container {
            display: flex;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        
        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px;
            color: white;
            outline: none;
        }
        
        #chat-send {
            background: #e94560;
            border: none;
            padding: 0 15px;
            color: white;
            cursor: pointer;
        }
        
        #players-online {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 100;
            min-width: 150px;
        }
        
        #performance {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #0f0;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 10px;
            z-index: 100;
        }
        
        #login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-box {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #e94560;
        }
        
        .login-box h2 {
            color: #e94560;
            margin-bottom: 20px;
        }
        
        .login-box input {
            width: 280px;
            padding: 12px;
            margin: 10px 0;
            background: #2d2d2d;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .login-box button {
            margin-top: 15px;
            padding: 12px 40px;
            font-size: 16px;
        }
        
        .controls-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script type="module">
        import * as THREE from 'three';
        
        // ==================== КОНФИГУРАЦИЯ ====================
        const SUPABASE_URL = 'https://runvaexsmgbdeboauaap.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1bnZhZXhzbWdiZGVib2F1YWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzM1MzcsImV4cCI6MjA5MDYwOTUzN30.y5AL4XkUPzDl1jGDLfvKistXflOpuxcSoedzbhr6hgk';
        
        const BASEPLATE_SIZE = 2048;
        const BASEPLATE_HEIGHT = -8;
        
        let supabase;
        let currentPlayer = null;
        let scene, camera, renderer, playerMesh;
        let keys = { w: false, s: false, a: false, d: false };
        let mouseX = 0, mouseY = 0;
        let isRunning = false;
        let players = new Map();
        let worldObjects = new Map();
        let lastUpdateTime = 0;
        
        // Исправленное управление
        function handleKeyDown(e) {
            switch(e.code) {
                case 'KeyW': keys.w = true; e.preventDefault(); break;
                case 'KeyS': keys.s = true; e.preventDefault(); break;
                case 'KeyA': keys.a = true; e.preventDefault(); break;
                case 'KeyD': keys.d = true; e.preventDefault(); break;
                case 'ShiftLeft': isRunning = true; e.preventDefault(); break;
                case 'Enter':
                    if (document.activeElement !== document.getElementById('chat-input')) {
                        document.getElementById('chat-input').focus();
                        e.preventDefault();
                    }
                    break;
            }
        }
        
        function handleKeyUp(e) {
            switch(e.code) {
                case 'KeyW': keys.w = false; break;
                case 'KeyS': keys.s = false; break;
                case 'KeyA': keys.a = false; break;
                case 'KeyD': keys.d = false; break;
                case 'ShiftLeft': isRunning = false; break;
            }
        }
        
        // Исправленное движение (W=вперед, S=назад, A=влево, D=вправо)
        function updateMovement() {
            if (!playerMesh) return;
            
            const speed = isRunning ? 20 : 10;
            let moveX = 0, moveZ = 0;
            
            if (keys.w) moveZ -= 1;
            if (keys.s) moveZ += 1;
            if (keys.a) moveX -= 1;
            if (keys.d) moveX += 1;
            
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
                
                // Движение относительно камеры
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                
                playerMesh.position.x += (moveX * right.x + moveZ * forward.x) * speed * 0.016;
                playerMesh.position.z += (moveX * right.z + moveZ * forward.z) * speed * 0.016;
                
                // Ограничение
                const limit = BASEPLATE_SIZE / 2 - 2;
                playerMesh.position.x = Math.max(-limit, Math.min(limit, playerMesh.position.x));
                playerMesh.position.z = Math.max(-limit, Math.min(limit, playerMesh.position.z));
                
                // Отправляем позицию в БД
                if (currentPlayer && Date.now() - lastUpdateTime > 50) {
                    lastUpdateTime = Date.now();
                    supabase.from('positions').upsert({
                        player_id: currentPlayer.id,
                        x: playerMesh.position.x,
                        z: playerMesh.position.z,
                        rotation_yaw: mouseX,
                        updated_at: new Date()
                    }).catch(console.error);
                }
                
                document.getElementById('pos').textContent = `X:${Math.round(playerMesh.position.x)} Z:${Math.round(playerMesh.position.z)}`;
            }
        }
        
        // Функции для объектов
        async function loadWorldObjects() {
            const { data } = await supabase.from('world_objects').select('*');
            if (data) {
                // Очищаем старые объекты
                worldObjects.forEach((obj, id) => {
                    scene.remove(obj.mesh);
                });
                worldObjects.clear();
                
                // Создаем новые
                data.forEach(obj => createWorldObject(obj));
                updateObjectsList();
            }
        }
        
        function createWorldObject(data) {
            let geometry, material;
            const color = data.color || '#e94560';
            
            switch(data.type) {
                case 'block':
                    geometry = new THREE.BoxGeometry(1, 1, 1);
                    material = new THREE.MeshStandardMaterial({ color: color });
                    break;
                case 'sphere':
                    geometry = new THREE.SphereGeometry(0.5, 32, 32);
                    material = new THREE.MeshStandardMaterial({ color: color });
                    break;
                case 'cylinder':
                    geometry = new THREE.CylinderGeometry(0.5, 0.5, 1, 32);
                    material = new THREE.MeshStandardMaterial({ color: color });
                    break;
                case 'tree':
                    const group = new THREE.Group();
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 1.2), new THREE.MeshStandardMaterial({ color: 0x8B5A2B }));
                    trunk.position.y = 0.6;
                    group.add(trunk);
                    const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.8, 1.2, 8), new THREE.MeshStandardMaterial({ color: 0x4caf50 }));
                    foliage.position.y = 1.2;
                    group.add(foliage);
                    group.position.set(data.x, BASEPLATE_HEIGHT + 1, data.z);
                    scene.add(group);
                    worldObjects.set(data.id, { mesh: group, data });
                    return;
                default:
                    geometry = new THREE.BoxGeometry(1, 1, 1);
                    material = new THREE.MeshStandardMaterial({ color: color });
            }
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(data.x, BASEPLATE_HEIGHT + 0.5, data.z);
            mesh.castShadow = true;
            scene.add(mesh);
            worldObjects.set(data.id, { mesh, data });
        }
        
        async function createObjectAtPlayer() {
            if (!playerMesh || !currentPlayer) {
                alert('Сначала войдите в игру!');
                return;
            }
            const name = document.getElementById('object-name').value || 'Объект';
            const type = document.getElementById('object-type').value;
            const color = document.getElementById('object-color').value;
            
            const { error } = await supabase.from('world_objects').insert({
                name: name,
                type: type,
                color: color,
                x: playerMesh.position.x,
                y: 0,
                z: playerMesh.position.z,
                owner_id: currentPlayer.id
            });
            
            if (error) {
                console.error('Error creating object:', error);
                alert('Ошибка создания: ' + error.message);
            } else {
                document.getElementById('object-name').value = '';
                loadWorldObjects(); // Перезагружаем объекты
            }
        }
        
        async function deleteObject(id) {
            await supabase.from('world_objects').delete().eq('id', id);
            loadWorldObjects();
        }
        
        async function updateObjectsList() {
            const { data } = await supabase.from('world_objects').select('*');
            const container = document.getElementById('objects-list');
            if (data && data.length > 0) {
                container.innerHTML = data.map(obj => `
                    <div class="object-item" onclick="window.deleteObject('${obj.id}')">
                        <div><strong>${escapeHtml(obj.name || obj.type)}</strong></div>
                        <div style="font-size:11px; color:#888;">X:${Math.round(obj.x)} Z:${Math.round(obj.z)}</div>
                        <div style="font-size:10px; color:#e94560;">✖ нажмите чтобы удалить</div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div style="color:#888; text-align:center;">Нет объектов</div>';
            }
        }
        
        // Загрузка других игроков
        async function loadOtherPlayers() {
            const { data } = await supabase.from('positions').select('player_id, x, z, profiles(username)');
            if (data && currentPlayer) {
                data.forEach(p => {
                    if (p.player_id !== currentPlayer.id) {
                        let playerObj = players.get(p.player_id);
                        if (!playerObj) {
                            const geometry = new THREE.BoxGeometry(0.8, 1.2, 0.8);
                            const material = new THREE.MeshStandardMaterial({ color: 0xff6b6b });
                            const mesh = new THREE.Mesh(geometry, material);
                            mesh.castShadow = true;
                            scene.add(mesh);
                            playerObj = { mesh, username: p.profiles?.username || 'Игрок' };
                            players.set(p.player_id, playerObj);
                        }
                        playerObj.mesh.position.set(p.x, BASEPLATE_HEIGHT + 1, p.z);
                    }
                });
                
                // Обновляем список онлайн
                document.getElementById('online-count').textContent = data.length + 1;
                const listDiv = document.getElementById('players-list');
                listDiv.innerHTML = `<div style="color:#4caf50;">⭐ ${currentPlayer.username} (Вы)</div>`;
                data.forEach(p => {
                    if (p.player_id !== currentPlayer.id) {
                        listDiv.innerHTML += `<div>👤 ${escapeHtml(p.profiles?.username || 'Игрок')}</div>`;
                    }
                });
            }
        }
        
        // Чат
        async function sendMessage(text) {
            if (!text.trim() || !currentPlayer) return;
            await supabase.from('messages').insert({
                player_id: currentPlayer.id,
                username: currentPlayer.username,
                message: text.slice(0, 200),
                created_at: new Date()
            });
        }
        
        async function loadMessages() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(30);
            const chatDiv = document.getElementById('chat-messages');
            if (data && chatDiv) {
                chatDiv.innerHTML = '';
                data.forEach(msg => {
                    chatDiv.innerHTML += `<div class="chat-message"><span class="chat-username">${escapeHtml(msg.username)}:</span> ${escapeHtml(msg.message)}</div>`;
                });
                chatDiv.scrollTop = chatDiv.scrollHeight;
            }
        }
        
        function subscribeToRealtime() {
            // Подписка на изменения позиций
            supabase.channel('positions-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'positions' }, (payload) => {
                    if (payload.new && payload.new.player_id !== currentPlayer?.id) {
                        loadOtherPlayers();
                    }
                })
                .subscribe();
            
            // Подписка на новые объекты
            supabase.channel('objects-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'world_objects' }, () => {
                    loadWorldObjects();
                })
                .subscribe();
            
            // Подписка на новые сообщения
            supabase.channel('messages-channel')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
                    if (payload.new) {
                        const chatDiv = document.getElementById('chat-messages');
                        chatDiv.innerHTML += `<div class="chat-message"><span class="chat-username">${escapeHtml(payload.new.username)}:</span> ${escapeHtml(payload.new.message)}</div>`;
                        chatDiv.scrollTop = chatDiv.scrollHeight;
                    }
                })
                .subscribe();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // THREE.JS инициализация
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 500, 1500);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Свет
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(10, 30, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            // Baseplate
            const baseplateGeo = new THREE.BoxGeometry(BASEPLATE_SIZE, 16, BASEPLATE_SIZE);
            const baseplateMat = new THREE.MeshStandardMaterial({ color: 0x6B4E3A });
            const baseplate = new THREE.Mesh(baseplateGeo, baseplateMat);
            baseplate.position.set(0, BASEPLATE_HEIGHT, 0);
            baseplate.receiveShadow = true;
            scene.add(baseplate);
            
            // Трава
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x5A9E4E });
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(BASEPLATE_SIZE, BASEPLATE_SIZE), grassMat);
            grass.rotation.x = -Math.PI / 2;
            grass.position.y = BASEPLATE_HEIGHT + 8.1;
            grass.receiveShadow = true;
            scene.add(grass);
            
            // Спавн платформа
            const spawnMat = new THREE.MeshStandardMaterial({ color: 0x4caf50, emissive: 0x1a4d1a });
            const spawn = new THREE.Mesh(new THREE.BoxGeometry(12, 1, 12), spawnMat);
            spawn.position.set(0, BASEPLATE_HEIGHT + 7.5, 0);
            scene.add(spawn);
        }
        
        function setupControls() {
            document.addEventListener('keydown', handleKeyDown);
            document.addEventListener('keyup', handleKeyUp);
            document.addEventListener('mousemove', (e) => {
                if (!document.pointerLockElement) return;
                mouseX += e.movementX * 0.003;
                mouseY += e.movementY * 0.003;
                mouseY = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, mouseY));
                camera.rotation.order = 'YXZ';
                camera.rotation.y = mouseX;
                camera.rotation.x = mouseY;
            });
            renderer.domElement.addEventListener('click', () => {
                renderer.domElement.requestPointerLock();
            });
        }
        
        async function startGame(username) {
            currentPlayer = {
                id: crypto.randomUUID(),
                username: username
            };
            
            // Создаем профиль
            await supabase.from('profiles').upsert({
                id: currentPlayer.id,
                username: currentPlayer.username,
                last_seen: new Date()
            });
            
            // Создаем позицию
            await supabase.from('positions').upsert({
                player_id: currentPlayer.id,
                x: 0,
                z: 0,
                rotation_yaw: 0,
                updated_at: new Date()
            });
            
            // Создаем игрока
            const playerGeo = new THREE.BoxGeometry(0.8, 1.2, 0.8);
            const playerMat = new THREE.MeshStandardMaterial({ color: 0x4caf50 });
            playerMesh = new THREE.Mesh(playerGeo, playerMat);
            playerMesh.castShadow = true;
            playerMesh.position.set(0, BASEPLATE_HEIGHT + 1, 0);
            scene.add(playerMesh);
            
            // Загружаем данные
            await loadWorldObjects();
            await loadOtherPlayers();
            await loadMessages();
            
            // Подписываемся на realtime
            subscribeToRealtime();
            
            // Периодические обновления
            setInterval(() => {
                loadOtherPlayers();
                updateObjectsList();
            }, 2000);
        }
        
        // Функция входа
        window.login = async function() {
            const username = document.getElementById('username-input').value.trim();
            if (!username || username.length < 2) {
                alert('Введите имя (минимум 2 символа)');
                return;
            }
            
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                await supabase.auth.signInAnonymously();
                
                initThree();
                setupControls();
                await startGame(username);
                
                document.getElementById('login-modal').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                document.getElementById('players-online').style.display = 'block';
                document.getElementById('chat-container').style.display = 'block';
                
                function animate() {
                    requestAnimationFrame(animate);
                    updateMovement();
                    if (playerMesh) {
                        camera.position.copy(playerMesh.position);
                        camera.position.y += 1.5;
                    }
                    renderer.render(scene, camera);
                }
                animate();
                
            } catch (error) {
                console.error('Login error:', error);
                alert('Ошибка входа: ' + error.message);
            }
        };
        
        window.onload = function() {
            document.getElementById('login-btn').onclick = window.login;
            document.getElementById('toggle-hub').onclick = () => {
                document.getElementById('creator-hub').classList.toggle('open');
            };
            document.getElementById('create-object').onclick = createObjectAtPlayer;
            document.getElementById('chat-send').onclick = () => {
                const input = document.getElementById('chat-input');
                if (input.value.trim()) {
                    sendMessage(input.value);
                    input.value = '';
                }
            };
            document.getElementById('chat-input').onkeypress = (e) => {
                if (e.key === 'Enter') document.getElementById('chat-send').click();
            };
        };
        
        window.deleteObject = deleteObject;
    </script>
</head>
<body>
    <button id="toggle-hub">🎨 Creator Hub</button>
    
    <div id="creator-hub">
        <div class="hub-header">
            <h1>SoberBlox Creator Hub</h1>
            <p>Создавайте и редактируйте мир</p>
        </div>
        
        <div class="hub-section">
            <h3>📦 Создать объект</h3>
            <input type="text" id="object-name" placeholder="Название">
            <select id="object-type">
                <option value="block">Блок</option>
                <option value="sphere">Сфера</option>
                <option value="cylinder">Цилиндр</option>
                <option value="tree">Дерево</option>
            </select>
            <input type="color" id="object-color" value="#e94560">
            <button id="create-object">Создать на позиции</button>
        </div>
        
        <div class="hub-section">
            <h3>🗑️ Объекты в мире</h3>
            <div id="objects-list">Загрузка...</div>
        </div>
    </div>
    
    <div id="hud" style="display: none;">
        <div>📍 Позиция: <span id="pos">X:0 Z:0</span></div>
        <div>🏃 Shift - бег</div>
    </div>
    
    <div id="players-online" style="display: none;">
        <div>👥 Онлайн: <span id="online-count">0</span></div>
        <div id="players-list"></div>
    </div>
    
    <div id="chat-container" style="display: none;">
        <div id="chat-messages"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Напишите сообщение..." maxlength="200">
            <button id="chat-send">➤</button>
        </div>
    </div>
    
    <div id="login-modal">
        <div class="login-box">
            <h2>SoberBlox</h2>
            <input type="text" id="username-input" placeholder="Введите имя игрока" maxlength="16">
            <button id="login-btn">Войти в игру</button>
        </div>
    </div>
    
    <div class="controls-info">
        🎮 WASD - движение | 🖱️ Мышь - поворот | Shift - бег | Enter - чат
    </div>
</body>
</html>
