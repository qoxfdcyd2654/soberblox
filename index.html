<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SoberBlox - 3D игра</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Creator Hub */
        #creator-hub {
            position: absolute;
            top: 0;
            left: -400px;
            width: 400px;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            z-index: 200;
            transition: left 0.3s ease;
            box-shadow: 2px 0 20px rgba(0,0,0,0.5);
            overflow-y: auto;
        }
        
        #creator-hub.open {
            left: 0;
        }
        
        .hub-header {
            background: #0f3460;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }
        
        .hub-header h1 {
            font-size: 24px;
            color: #e94560;
        }
        
        .hub-section {
            padding: 20px;
            border-bottom: 1px solid #2a2a4a;
        }
        
        .hub-section h3 {
            color: #e94560;
            margin-bottom: 15px;
        }
        
        .object-item {
            background: #0f0f1f;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            border-left: 3px solid #e94560;
        }
        
        .object-item:hover {
            background: #1a1a2e;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #0f0f1f;
            border: 1px solid #2a2a4a;
            color: white;
            border-radius: 6px;
        }
        
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #ff6b6b;
        }
        
        #toggle-hub {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 150;
            font-weight: bold;
        }
        
        #hud {
            position: absolute;
            top: 20px;
            left: 100px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
        }
        
        #chat-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 350px;
            background: rgba(0,0,0,0.85);
            border-radius: 8px;
            z-index: 100;
        }
        
        #chat-messages {
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            color: white;
            font-size: 13px;
        }
        
        .chat-message {
            margin-bottom: 6px;
        }
        
        .chat-username {
            color: #e94560;
            font-weight: bold;
        }
        
        #chat-input-container {
            display: flex;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        
        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px;
            color: white;
            outline: none;
        }
        
        #chat-send {
            background: #e94560;
            border: none;
            padding: 0 15px;
            color: white;
            cursor: pointer;
        }
        
        #players-online {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 100;
            min-width: 150px;
        }
        
        #performance {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #0f0;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 10px;
            z-index: 100;
        }
        
        #login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-box {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #e94560;
        }
        
        .login-box h2 {
            color: #e94560;
            margin-bottom: 20px;
        }
        
        .login-box input {
            width: 280px;
            padding: 12px;
            margin: 10px 0;
            background: #2d2d2d;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .login-box button {
            margin-top: 15px;
            padding: 12px 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <button id="toggle-hub">🎨 Creator Hub</button>
    
    <div id="creator-hub">
        <div class="hub-header">
            <h1>SoberBlox Creator Hub</h1>
            <p>Создавайте и редактируйте мир</p>
        </div>
        
        <div class="hub-section">
            <h3>📦 Создать объект</h3>
            <input type="text" id="object-name" placeholder="Название">
            <select id="object-type">
                <option value="block">Блок</option>
                <option value="sphere">Сфера</option>
                <option value="cylinder">Цилиндр</option>
                <option value="tree">Дерево</option>
            </select>
            <input type="color" id="object-color" value="#e94560">
            <button id="create-object">Создать на позиции</button>
        </div>
        
        <div class="hub-section">
            <h3>🗑️ Объекты в мире</h3>
            <div id="objects-list">Загрузка...</div>
        </div>
    </div>
    
    <div id="hud">
        <div>📍 Позиция: <span id="pos">X:0 Z:0</span></div>
    </div>
    
    <div id="players-online">
        <div>👥 Онлайн: <span id="online-count">0</span></div>
        <div id="players-list"></div>
    </div>
    
    <div id="chat-container">
        <div id="chat-messages"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Напишите сообщение..." maxlength="200">
            <button id="chat-send">➤</button>
        </div>
    </div>
    
    <div id="performance">
        FPS: <span id="fps">0</span> | Обн/сек: <span id="updates">0</span>
    </div>
    
    <div id="login-modal">
        <div class="login-box">
            <h2>SoberBlox</h2>
            <input type="text" id="username-input" placeholder="Введите имя игрока" maxlength="16">
            <button id="login-btn">Войти в игру</button>
        </div>
    </div>
    
    <script src="https://cdn.skypack.dev/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // ==================== КОНФИГУРАЦИЯ ====================
        const SUPABASE_URL = 'https://runvaexsmgbdeboauaap.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1bnZhZXhzbWdiZGVib2F1YWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzM1MzcsImV4cCI6MjA5MDYwOTUzN30.y5AL4XkUPzDl1jGDLfvKistXflOpuxcSoedzbhr6hgk';
        
        const BASEPLATE_SIZE = 2048;
        const BASEPLATE_HEIGHT = -8;
        
        let supabase;
        let currentPlayer = null;
        let scene, camera, renderer, player;
        let keys = {};
        let mouseX = 0, mouseY = 0;
        let isRunning = false;
        let players = new Map();
        let worldObjects = new Map();
        
        // Система дифференциальных обновлений
        let updateState = {
            playersOld: new Map(),
            objectsOld: new Map(),
            lastMessageId: null,
            updatesPerSec: 0,
            lastFpsTime: performance.now(),
            frameCount: 0
        };
        
        function getPlayerString(p) {
            return `${p.player_id}|${Math.round(p.x)}|${Math.round(p.z)}`;
        }
        
        function getObjectString(obj) {
            return `${obj.id}|${obj.x}|${obj.z}|${obj.type}|${obj.color}`;
        }
        
        // ГЛАВНЫЙ ЦИКЛ ОБНОВЛЕНИЙ (каждые 16.67 мс)
        async function checkAndUpdateChanges() {
            const now = performance.now();
            
            // 1. ПРОВЕРКА ИГРОКОВ
            const { data: playersData } = await supabase
                .from('positions')
                .select('player_id, x, z, profiles(username)');
            
            if (playersData) {
                const currentMap = new Map();
                playersData.forEach(p => {
                    currentMap.set(p.player_id, {
                        str: getPlayerString(p),
                        data: p
                    });
                });
                
                // Обновляем изменившихся
                for (let [id, current] of currentMap) {
                    const old = updateState.playersOld.get(id);
                    if (!old || old.str !== current.str) {
                        updatePlayerInGame(id, current.data);
                    }
                }
                
                // Удаляем вышедших
                for (let [id] of updateState.playersOld) {
                    if (!currentMap.has(id)) {
                        removePlayerFromGame(id);
                    }
                }
                
                updateState.playersOld = currentMap;
                document.getElementById('online-count').textContent = playersData.length + 1;
            }
            
            // 2. ПРОВЕРКА ОБЪЕКТОВ
            const { data: objectsData } = await supabase
                .from('world_objects')
                .select('*');
            
            if (objectsData) {
                const currentMap = new Map();
                objectsData.forEach(obj => {
                    currentMap.set(obj.id, {
                        str: getObjectString(obj),
                        data: obj
                    });
                });
                
                for (let [id, current] of currentMap) {
                    const old = updateState.objectsOld.get(id);
                    if (!old || old.str !== current.str) {
                        if (!old) {
                            createWorldObject(current.data);
                        } else {
                            updateWorldObject(current.data);
                        }
                    }
                }
                
                for (let [id] of updateState.objectsOld) {
                    if (!currentMap.has(id)) {
                        removeWorldObject(id);
                    }
                }
                
                updateState.objectsOld = currentMap;
            }
            
            // 3. ПРОВЕРКА ЧАТА
            const { data: messages } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(5);
            
            if (messages && messages.length > 0 && updateState.lastMessageId !== messages[0].id) {
                messages.reverse().forEach(msg => {
                    if (!updateState.lastMessageId || msg.id !== updateState.lastMessageId) {
                        addMessageToChat(msg.username, msg.message);
                    }
                });
                updateState.lastMessageId = messages[0]?.id;
            }
            
            // Статистика
            updateState.updatesPerSec++;
            if (now - updateState.lastFpsTime >= 1000) {
                document.getElementById('fps').textContent = updateState.frameCount;
                document.getElementById('updates').textContent = updateState.updatesPerSec;
                updateState.frameCount = 0;
                updateState.updatesPerSec = 0;
                updateState.lastFpsTime = now;
            }
        }
        
        function updatePlayerInGame(id, data) {
            let playerObj = players.get(id);
            if (!playerObj) {
                const mesh = createPlayerModel(`hsl(${Math.random() * 360}, 70%, 50%)`);
                scene.add(mesh);
                playerObj = { mesh, username: data.profiles?.username || 'Игрок' };
                players.set(id, playerObj);
            }
            playerObj.mesh.position.set(data.x, BASEPLATE_HEIGHT + 1, data.z);
        }
        
        function removePlayerFromGame(id) {
            const obj = players.get(id);
            if (obj) {
                scene.remove(obj.mesh);
                players.delete(id);
            }
        }
        
        function createWorldObject(data) {
            let geometry, material;
            const color = data.color || '#e94560';
            
            switch(data.type) {
                case 'block':
                    geometry = new THREE.BoxGeometry(1, 1, 1);
                    break;
                case 'sphere':
                    geometry = new THREE.SphereGeometry(0.5, 32, 32);
                    break;
                case 'cylinder':
                    geometry = new THREE.CylinderGeometry(0.5, 0.5, 1, 32);
                    break;
                case 'tree':
                    const group = new THREE.Group();
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 1.2), new THREE.MeshStandardMaterial({ color: 0x8B5A2B }));
                    trunk.position.y = 0.6;
                    group.add(trunk);
                    const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.8, 1.2, 8), new THREE.MeshStandardMaterial({ color: 0x4caf50 }));
                    foliage.position.y = 1.2;
                    group.add(foliage);
                    group.position.set(data.x, BASEPLATE_HEIGHT + 1, data.z);
                    scene.add(group);
                    worldObjects.set(data.id, { mesh: group, data });
                    return;
                default:
                    geometry = new THREE.BoxGeometry(1, 1, 1);
            }
            
            material = new THREE.MeshStandardMaterial({ color: color });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(data.x, BASEPLATE_HEIGHT + 0.5, data.z);
            mesh.castShadow = true;
            scene.add(mesh);
            worldObjects.set(data.id, { mesh, data });
        }
        
        function updateWorldObject(data) {
            const existing = worldObjects.get(data.id);
            if (existing) {
                existing.mesh.position.set(data.x, BASEPLATE_HEIGHT + 0.5, data.z);
                if (existing.mesh.material) existing.mesh.material.color.set(data.color);
            }
        }
        
        function removeWorldObject(id) {
            const obj = worldObjects.get(id);
            if (obj) {
                scene.remove(obj.mesh);
                worldObjects.delete(id);
            }
        }
        
        async function createObjectAtPlayer() {
            if (!player) return;
            const name = document.getElementById('object-name').value || 'Объект';
            const type = document.getElementById('object-type').value;
            const color = document.getElementById('object-color').value;
            
            await supabase.from('world_objects').insert({
                name: name,
                type: type,
                color: color,
                x: player.position.x,
                y: 0,
                z: player.position.z,
                owner_id: currentPlayer.id
            });
            
            document.getElementById('object-name').value = '';
            updateObjectsList();
        }
        
        async function deleteObject(id) {
            await supabase.from('world_objects').delete().eq('id', id);
            updateObjectsList();
        }
        
        async function updateObjectsList() {
            const { data } = await supabase.from('world_objects').select('*');
            const container = document.getElementById('objects-list');
            if (data && data.length > 0) {
                container.innerHTML = data.map(obj => `
                    <div class="object-item" onclick="window.deleteObject('${obj.id}')">
                        <div><strong>${obj.name || obj.type}</strong></div>
                        <div style="font-size:11px; color:#888;">X:${Math.round(obj.x)} Z:${Math.round(obj.z)}</div>
                        <div style="font-size:10px; color:#e94560;">нажмите чтобы удалить</div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div style="color:#888; text-align:center;">Нет объектов</div>';
            }
        }
        
        // THREE.JS
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 500, 1500);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(10, 30, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            // Baseplate
            const baseplate = new THREE.Mesh(
                new THREE.BoxGeometry(BASEPLATE_SIZE, 16, BASEPLATE_SIZE),
                new THREE.MeshStandardMaterial({ color: 0x6B4E3A })
            );
            baseplate.position.set(0, BASEPLATE_HEIGHT, 0);
            baseplate.receiveShadow = true;
            scene.add(baseplate);
            
            // Трава
            const grass = new THREE.Mesh(
                new THREE.PlaneGeometry(BASEPLATE_SIZE, BASEPLATE_SIZE),
                new THREE.MeshStandardMaterial({ color: 0x5A9E4E })
            );
            grass.rotation.x = -Math.PI / 2;
            grass.position.y = BASEPLATE_HEIGHT + 8.1;
            grass.receiveShadow = true;
            scene.add(grass);
            
            // Спавн платформа
            const spawn = new THREE.Mesh(
                new THREE.BoxGeometry(12, 1, 12),
                new THREE.MeshStandardMaterial({ color: 0x4caf50, emissive: 0x1a4d1a })
            );
            spawn.position.set(0, BASEPLATE_HEIGHT + 7.5, 0);
            scene.add(spawn);
        }
        
        function createPlayerModel(color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.8), new THREE.MeshStandardMaterial({ color: color }));
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), new THREE.MeshStandardMaterial({ color: 0xFFDDB7 }));
            head.position.y = 1.2;
            head.castShadow = true;
            group.add(head);
            return group;
        }
        
        function setupControls() {
            document.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'Enter' && document.activeElement !== document.getElementById('chat-input')) {
                    document.getElementById('chat-input').focus();
                }
                if (e.code === 'ShiftLeft') isRunning = true;
            });
            document.addEventListener('keyup', (e) => {
                keys[e.code] = false;
                if (e.code === 'ShiftLeft') isRunning = false;
            });
            document.addEventListener('mousemove', (e) => {
                if (!document.pointerLockElement) return;
                mouseX += e.movementX * 0.002;
                mouseY += e.movementY * 0.002;
                mouseY = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, mouseY));
                camera.rotation.order = 'YXZ';
                camera.rotation.y = mouseX;
                camera.rotation.x = mouseY;
            });
            renderer.domElement.addEventListener('click', () => {
                renderer.domElement.requestPointerLock();
            });
        }
        
        function updateMovement() {
            if (!player) return;
            const speed = isRunning ? 15 : 7;
            let moveX = 0, moveZ = 0;
            if (keys['KeyW']) moveZ -= 1;
            if (keys['KeyS']) moveZ += 1;
            if (keys['KeyA']) moveX -= 1;
            if (keys['KeyD']) moveX += 1;
            
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                player.position.x += (moveX * right.x + moveZ * forward.x) * speed * 0.016;
                player.position.z += (moveX * right.z + moveZ * forward.z) * speed * 0.016;
                
                const limit = BASEPLATE_SIZE / 2 - 1;
                player.position.x = Math.max(-limit, Math.min(limit, player.position.x));
                player.position.z = Math.max(-limit, Math.min(limit, player.position.z));
                
                supabase.from('positions').upsert({
                    player_id: currentPlayer.id,
                    x: player.position.x,
                    z: player.position.z,
                    rotation_yaw: mouseX,
                    updated_at: new Date()
                });
                
                document.getElementById('pos').textContent = `X:${Math.round(player.position.x)} Z:${Math.round(player.position.z)}`;
            }
        }
        
        async function sendMessage(text) {
            if (!text.trim()) return;
            await supabase.from('messages').insert({
                player_id: currentPlayer.id,
                username: currentPlayer.username,
                message: text.slice(0, 200),
                created_at: new Date()
            });
        }
        
        function addMessageToChat(username, message) {
            const chatDiv = document.getElementById('chat-messages');
            chatDiv.innerHTML += `<div class="chat-message"><span class="chat-username">${escapeHtml(username)}:</span> ${escapeHtml(message)}</div>`;
            chatDiv.scrollTop = chatDiv.scrollHeight;
            if (chatDiv.children.length > 100) chatDiv.removeChild(chatDiv.firstChild);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function startGame(username) {
            currentPlayer = {
                id: crypto.randomUUID(),
                username: username
            };
            
            await supabase.from('profiles').upsert({
                id: currentPlayer.id,
                username: currentPlayer.username,
                last_seen: new Date()
            });
            
            await supabase.from('positions').upsert({
                player_id: currentPlayer.id,
                x: 0,
                z: 0,
                rotation_yaw: 0,
                updated_at: new Date()
            });
            
            player = createPlayerModel(0x4caf50);
            player.position.set(0, BASEPLATE_HEIGHT + 1, 0);
            scene.add(player);
            
            setInterval(checkAndUpdateChanges, 16);
            setInterval(updateObjectsList, 3000);
            
            // Обновление списка игроков
            setInterval(async () => {
                const { data } = await supabase.from('positions').select('player_id, profiles(username)');
                const listDiv = document.getElementById('players-list');
                if (data) {
                    listDiv.innerHTML = `<div style="color:#4caf50;">⭐ ${currentPlayer.username} (Вы)</div>`;
                    data.forEach(p => {
                        if (p.player_id !== currentPlayer.id) {
                            listDiv.innerHTML += `<div>👤 ${p.profiles?.username || 'Игрок'}</div>`;
                        }
                    });
                }
            }, 3000);
        }
        
        // ЗАПУСК
        window.deleteObject = deleteObject;
        
        document.getElementById('login-btn').onclick = async () => {
            const username = document.getElementById('username-input').value.trim();
            if (!username || username.length < 2) {
                alert('Введите имя (минимум 2 символа)');
                return;
            }
            
            supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            await supabase.auth.signInAnonymously();
            
            initThree();
            setupControls();
            await startGame(username);
            
            document.getElementById('login-modal').style.display = 'none';
            
            function animate() {
                requestAnimationFrame(animate);
                updateMovement();
                updateState.frameCount++;
                if (player) {
                    camera.position.copy(player.position);
                    camera.position.y += 1.5;
                }
                renderer.render(scene, camera);
            }
            animate();
        };
        
        document.getElementById('toggle-hub').onclick = () => {
            document.getElementById('creator-hub').classList.toggle('open');
        };
        
        document.getElementById('create-object').onclick = createObjectAtPlayer;
        document.getElementById('chat-send').onclick = () => {
            const input = document.getElementById('chat-input');
            if (input.value.trim()) {
                sendMessage(input.value);
                input.value = '';
            }
        };
        document.getElementById('chat-input').onkeypress = (e) => {
            if (e.key === 'Enter') document.getElementById('chat-send').click();
        };
    </script>
</body>
</html>
